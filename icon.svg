<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="#2196F3"/>
  
  <!-- Document shape -->
  <rect x="24" y="20" width="56" height="72" rx="4" fill="white"/>
  
  <!-- Markdown M -->
  <text x="52" y="68" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#2196F3" text-anchor="middle">M</text>
  
  <!-- Browser/Window shape -->
  <rect x="52" y="48" width="52" height="60" rx="6" fill="white" opacity="0.9"/>
  
  <!-- Browser top bar -->
  <rect x="52" y="48" width="52" height="14" rx="6" fill="#E3F2FD"/>
  <rect x="52" y="56" width="52" height="6" fill="#E3F2FD"/>
  
  <!-- Three dots for browser controls -->
  <circle cx="60" cy="55" r="2.5" fill="#FF5F56"/>
  <circle cx="68" cy="55" r="2.5" fill="#FFBD2E"/>
  <circle cx="76" cy="55" r="2.5" fill="#27C93F"/>
  
  <!-- Content lines in browser -->
  <rect x="58" y="72" width="40" height="4" rx="2" fill="#90CAF9"/>
  <rect x="58" y="82" width="32" height="4" rx="2" fill="#BBDEFB"/>
  <rect x="58" y="92" width="36" height="4" rx="2" fill="#BBDEFB"/>
</svg>
